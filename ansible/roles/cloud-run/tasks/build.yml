#     - npm install 
    
# - name: run npm build in frontend
#   shell: npm run-script build
#   args:
#     chdir: "{{workspace}}/frontend"
#   ignore_errors: True
          
- name: build custodian/bento-frontend image
  docker_image:
    build:
      path: "{{workspace}}/frontend"
      dockerfile: "{{workspace}}/backend/dockerfiles/frontend-cloudrun-dockerfile"
      pull: yes
      nocache: yes
    name: gcr.io/{{gcp_project}}/frontend
    tag: "{{image_tag}}"
    force_tag: yes
    source: build
    force_source: yes
    push: yes

- name: update deployments
  shell: "{{item}}"
  loop:
    - gcloud beta run services replace {{workspace}}/backend.yml --platform managed --region  {{region}}
    - gcloud beta run services replace {{workspace}}/frontend.yml --platform managed --region {{region}}
  when: update == "yes"